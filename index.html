<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eaves — Nightlife in Leuven</title>
<meta name="description" content="Eaves is a nightlife and events discovery app. Launching in Leuven, September 2026.">
<link rel="icon" type="image/png" href="/assets/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #121212;
    --bg-raised: #1A1A1A;
    --red:       #8B0000;
    --red-bright:#B8291F;
    --text:      #F2F0ED;
    --text-muted:#8A8A8A;
    --border:    #2A2A2A;
  }

  * { box-sizing: border-box; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100%;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 40px;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red-bright);
    box-shadow: 0 0 8px var(--red-bright);
  }

  .logo-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 28px;
  }

  .logo-wrap img {
    width: 100%;
    height: 100%;
    position: relative;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(40px, 8vw, 64px);
    letter-spacing: -0.02em;
    margin: 0 0 12px;
  }

  p.tagline {
    font-size: clamp(16px, 3vw, 19px);
    color: var(--text-muted);
    margin: 0 0 4px;
    max-width: 380px;
  }

  p.location {
    font-size: 14px;
    color: var(--text-muted);
    margin: 4px 0 0;
  }

  p.location strong {
    color: var(--text);
    font-weight: 500;
  }

  footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 28px 24px 32px;
    border-top: 1px solid var(--border);
  }

  .footer-links {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  footer a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.15s ease;
  }

  footer a:hover,
  footer a:focus-visible {
    color: var(--text);
  }

  a:focus-visible {
    outline: 2px solid var(--red-bright);
    outline-offset: 3px;
    border-radius: 2px;
  }

  .contact {
    font-size: 12px;
    color: #5A5A5A;
  }
</style>
</head>
<body>

  <main>
    <span class="badge">Launching September 2026</span>

    <div class="logo-wrap">
      <img src="/assets/icon.png" alt="Eaves logo">
    </div>

    <h1>Eaves</h1>
    <p class="tagline">Discover nightlife with friends.</p>
    <p class="location">Starting in <strong>Leuven</strong>.</p>
  </main>

  <footer>
    <div class="footer-links">
      <a href="/privacy.html">Privacy Policy</a>
      <a href="/terms.html">Terms of Service</a>
      <a href="https://instagram.com/eaves.app">Instagram</a>
    </div>
    <span class="contact">eaves.help@gmail.com</span>
  </footer>

</body>
</html>
